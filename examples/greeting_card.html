<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electronic Greeting Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0010;
    font-family: 'Georgia', serif;
    overflow: hidden;
    cursor: pointer;
  }

  /* ── 星空画布 ── */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ── 贺卡容器 ── */
  .card-wrapper {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    perspective: 1000px;
  }

  .card {
    position: relative;
    width: min(520px, 92vw);
    padding: 52px 44px 44px;
    border-radius: 24px;
    background: linear-gradient(135deg,
      rgba(255,255,255,0.08) 0%,
      rgba(180,120,255,0.06) 50%,
      rgba(255,180,100,0.06) 100%);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow:
      0 0 60px rgba(160,80,255,0.25),
      0 0 120px rgba(255,140,80,0.1),
      inset 0 1px 0 rgba(255,255,255,0.2);
    transform-style: preserve-3d;
    transition: transform 0.1s ease-out;
    animation: cardFloat 4s ease-in-out infinite;
  }

  @keyframes cardFloat {
    0%, 100% { transform: translateY(0px) rotateX(0deg); }
    50% { transform: translateY(-10px) rotateX(1deg); }
  }

  /* ── 旋转光晕徽章 ── */
  .badge-ring {
    width: 88px;
    height: 88px;
    margin: 0 auto 28px;
    position: relative;
  }

  .badge-ring::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(
      #ff6eb4, #b06bff, #6bbaff, #6bffb0, #fff06b, #ffb06b, #ff6eb4
    );
    animation: spinRing 3s linear infinite;
  }

  @keyframes spinRing {
    to { transform: rotate(360deg); }
  }

  .badge-inner {
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #2a0050, #0a0010);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    filter: drop-shadow(0 0 8px rgba(200,150,255,0.8));
    z-index: 1;
  }

  /* ── 主标题 ── */
  .card-title {
    text-align: center;
    font-size: clamp(22px, 5vw, 32px);
    font-weight: bold;
    letter-spacing: 0.06em;
    background: linear-gradient(135deg, #ffd6a5, #ffb3c6, #d4aaff, #a0d4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    min-height: 48px;
    margin-bottom: 24px;
  }

  /* ── 副文案 ── */
  .card-body {
    text-align: center;
    color: rgba(255,255,255,0.82);
    font-size: clamp(14px, 3vw, 17px);
    line-height: 1.9;
    opacity: 0;
    animation: fadeInUp 1s ease forwards;
    animation-delay: 3.2s;
    margin-bottom: 32px;
  }

  .recipient {
    display: inline-block;
    color: #ffd6a5;
    font-style: italic;
    font-size: 1.1em;
    text-shadow: 0 0 12px rgba(255,200,100,0.6);
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 分割线 ── */
  .divider {
    width: 60%;
    height: 1px;
    margin: 0 auto 28px;
    background: linear-gradient(90deg,
      transparent, rgba(200,150,255,0.5), transparent);
    opacity: 0;
    animation: fadeInUp 0.8s ease forwards;
    animation-delay: 3.6s;
  }

  /* ── 签名区 ── */
  .card-sign {
    text-align: right;
    opacity: 0;
    animation: fadeInUp 1s ease forwards;
    animation-delay: 4s;
  }

  .sign-label {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .sign-name {
    font-family: 'Brush Script MT', 'Segoe Script', cursive;
    font-size: clamp(22px, 5vw, 30px);
    background: linear-gradient(135deg, #ffb3c6, #d4aaff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 6px rgba(220,150,255,0.4));
  }

  /* ── 提示文字 ── */
  .hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 13px;
    letter-spacing: 0.12em;
    z-index: 20;
    animation: pulse 2s ease-in-out infinite;
    animation-delay: 5s;
    opacity: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  /* ── 漂浮星星 ── */
  .star-deco {
    position: fixed;
    pointer-events: none;
    z-index: 5;
    animation: starDrift linear infinite;
  }

  @keyframes starDrift {
    0%   { opacity: 0; transform: translateY(0) scale(0.5); }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-80px) scale(1.2); }
  }

  /* ── 礼花粒子 ── */
  .confetti {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(300px) rotate(720deg) scale(0.3); }
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="card-wrapper" id="cardWrapper">
  <div class="card" id="greetingCard">
    <div class="badge-ring">
      <div class="badge-inner">✦</div>
    </div>
    <div class="card-title" id="titleText"></div>
    <div class="card-body">
      致亲爱的 <span class="recipient">【RECIPIENT_NAME】</span>，<br>
      愿你所求皆如愿，<br>
      所行皆坦途，<br>
      所爱皆温柔。<br>
      <br>
      点击页面，送你一场烟火 ✦
    </div>
    <div class="divider"></div>
    <div class="card-sign">
      <div class="sign-label">With love</div>
      <div class="sign-name">【SENDER_NAME】</div>
    </div>
  </div>
</div>

<div class="hint">✦ &nbsp; Click anywhere for fireworks &nbsp; ✦</div>

<script>
// ── 1. 星空背景 (Canvas 粒子系统) ──────────────────────
(function initStarfield() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function createStar() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + 0.3,
      alpha: Math.random(),
      speed: Math.random() * 0.006 + 0.002,
      twinkleOffset: Math.random() * Math.PI * 2
    };
  }

  function initStars() {
    stars = [];
    const count = Math.floor(W * H / 4000);
    for (let i = 0; i < count; i++) stars.push(createStar());
  }

  function drawStars(t) {
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      const alpha = 0.3 + 0.7 * Math.abs(Math.sin(t * s.speed + s.twinkleOffset));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    }
  }

  function loop(t) {
    drawStars(t * 0.001);
    requestAnimationFrame(loop);
  }

  resize();
  initStars();
  window.addEventListener('resize', () => { resize(); initStars(); });
  requestAnimationFrame(loop);
})();


// ── 2. 打字机效果 ─────────────────────────────────────
(function typewriter() {
  const el = document.getElementById('titleText');
  const text = '送你一颗星 ✦';
  let i = 0;

  function type() {
    if (i < text.length) {
      el.textContent += text[i++];
      setTimeout(type, 120 + Math.random() * 80);
    }
  }

  setTimeout(type, 600);
})();


// ── 3. 3D 视差倾斜效果 ───────────────────────────────
(function tiltCard() {
  const wrapper = document.getElementById('cardWrapper');
  const card = document.getElementById('greetingCard');

  wrapper.addEventListener('mousemove', function(e) {
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (e.clientX - cx) / (rect.width / 2);
    const dy = (e.clientY - cy) / (rect.height / 2);
    card.style.transform =
      `translateY(-10px) rotateX(${-dy * 8}deg) rotateY(${dx * 8}deg)`;
    card.style.animation = 'none';
  });

  wrapper.addEventListener('mouseleave', function() {
    card.style.transform = '';
    card.style.animation = 'cardFloat 4s ease-in-out infinite';
  });
})();


// ── 4. 礼花爆炸系统 ──────────────────────────────────
(function confettiSystem() {
  const COLORS = [
    '#ff6eb4', '#ffb06b', '#ffd700', '#b06bff',
    '#6bbaff', '#6bffb0', '#ff6b6b', '#ffffff'
  ];

  function burst(x, y) {
    const count = 60 + Math.floor(Math.random() * 40);
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';

      const size = 4 + Math.random() * 8;
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const angle = Math.random() * 360;
      const vx = (Math.random() - 0.5) * 220;
      const vy = -(Math.random() * 200 + 80);
      const duration = 0.8 + Math.random() * 0.8;

      el.style.cssText = `
        left: ${x}px; top: ${y}px;
        width: ${size}px; height: ${size * (Math.random() > 0.5 ? 1 : 2.5)}px;
        background: ${color};
        box-shadow: 0 0 ${size}px ${color};
        animation-duration: ${duration}s;
        transform: rotate(${angle}deg);
      `;

      // 使用 CSS 变量驱动位移
      el.animate([
        { transform: `rotate(${angle}deg) translate(0,0) scale(1)`, opacity: 1 },
        { transform: `rotate(${angle + 360 + Math.random()*360}deg) translate(${vx}px,${vy}px) scale(0.3)`, opacity: 0 }
      ], {
        duration: duration * 1000,
        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
        fill: 'forwards'
      });

      document.body.appendChild(el);
      setTimeout(() => el.remove(), duration * 1000 + 100);
    }
  }

  document.addEventListener('click', function(e) {
    burst(e.clientX, e.clientY);
  });

  // 入场自动礼花
  setTimeout(() => {
    burst(window.innerWidth / 2, window.innerHeight / 2 - 60);
  }, 4800);
})();


// ── 5. 漂浮装饰星星 ──────────────────────────────────
(function floatingStars() {
  const EMOJIS = ['✦', '✧', '⋆', '✩', '✪', '❋'];

  function spawnStar() {
    const el = document.createElement('div');
    el.className = 'star-deco';
    el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];

    const size = 12 + Math.random() * 14;
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight;
    const dur = 4 + Math.random() * 6;
    const hue = Math.floor(Math.random() * 360);

    el.style.cssText = `
      left: ${x}px; top: ${y}px;
      font-size: ${size}px;
      color: hsl(${hue}, 90%, 80%);
      text-shadow: 0 0 ${size}px hsl(${hue}, 90%, 70%);
      animation-duration: ${dur}s;
      animation-delay: ${Math.random() * 3}s;
    `;

    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + 3) * 1000);
  }

  // 持续生成漂浮星星
  setInterval(spawnStar, 400);
  for (let i = 0; i < 12; i++) spawnStar();
})();


// ── 6. hint 延迟显示 ─────────────────────────────────
setTimeout(() => {
  document.querySelector('.hint').style.opacity = '0.3';
}, 5000);
</script>
</body>
</html>
